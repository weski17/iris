name: Iris API - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/iris-api

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: 📦 Install ML dependencies
      run: |
        pip install -r ml/requirements.txt
        pytest ml/test_train.py -v --tb=short

    - name: 🧠 Train ML model
      run: python ml/train.py

    - name: 📦 Install API dependencies
      run: |
        pip install -r api/requirements.txt
        pytest api/test_api.py -v --tb=short --cov=api.main --cov-report=term-missing

    - name: 🔍 Lint code
      run: |
        pip install flake8
        flake8 api/main.py --count --statistics || true

  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔑 Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: 🏗️ Build and push image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./api/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: 📝 Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: 🚀 Deploy to staging
      run: |
        kubectl set image deployment/iris-api \
          iris-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} \
          -n iris-staging --record

        kubectl rollout status deployment/iris-api -n iris-staging --timeout=5m

    - name: 🧪 Run integration tests
      run: |
        kubectl port-forward -n iris-staging svc/iris-api 8080:80 &
        sleep 5

        curl -f http://localhost:8080/health || exit 1
        curl -f http://localhost:8080/model/info || exit 1

        curl -f -X POST http://localhost:8080/predict \
          -H "Content-Type: application/json" \
          -d '{"sepal_length": 5.1, "sepal_width": 3.5, "petal_length": 1.4, "petal_width": 0.2}' \
          || exit 1

    - name: 📢 Notify Slack on failure
      if: failure()
      uses: slackapi/slack-github-action@v1
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "❌ Staging deployment failed - Build #${{ github.run_number }}"
          }

  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: https://api.iris.production

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 🔧 Setup kubectl
      uses: azure/setup-kubectl@v3

    - name: 📝 Configure kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: 🚀 Deploy to production
      run: |
        kubectl set image deployment/iris-api \
          iris-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.run_number }} \
          -n iris-prod --record

        kubectl rollout status deployment/iris-api -n iris-prod --timeout=10m

    - name: 🧪 Run smoke tests
      run: |
        kubectl port-forward -n iris-prod svc/iris-api 8080:80 &
        sleep 5

        curl -f http://localhost:8080/health || exit 1

    - name: 📢 Notify Slack on success
      if: success()
      uses: slackapi/slack-github-action@v1
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "✅ Production deployment successful - Build #${{ github.run_number }}"
          }

    - name: 📢 Notify Slack on failure
      if: failure()
      uses: slackapi/slack-github-action@v1
      with:
        webhook-url: ${{ secrets.SLACK_WEBHOOK }}
        payload: |
          {
            "text": "❌ Production deployment failed - Build #${{ github.run_number }}"
          }
