apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: iris-api-prod

namespace: iris-prod

bases:
  - ../../base

replicas:
  - name: iris-api
    count: 5

commonLabels:
  environment: production

commonAnnotations:
  environment: "production"
  compliance: "pci-dss"

patchesStrategicMerge:
  - deployment-patch.yaml

patchesJson6902:
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: iris-api-hpa
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 20
      - op: replace
        path: /spec/minReplicas
        value: 5
