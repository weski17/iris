apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: iris-api-dev

namespace: iris-dev

bases:
  - ../../base

replicas:
  - name: iris-api
    count: 1

commonLabels:
  environment: development

commonAnnotations:
  environment: "development"

patchesStrategicMerge:
  - deployment-patch.yaml
