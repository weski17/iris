apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: iris-api-staging

namespace: iris-staging

bases:
  - ../../base

replicas:
  - name: iris-api
    count: 3

commonLabels:
  environment: staging

commonAnnotations:
  environment: "staging"

patchesStrategicMerge:
  - deployment-patch.yaml
