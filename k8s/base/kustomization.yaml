apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: iris-api-base

namespace: iris-dev

resources:
  - namespaces.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml

commonLabels:
  app: iris-api
  managed-by: kustomize

commonAnnotations:
  managed-by: "kustomize"
  version: "1.0"
