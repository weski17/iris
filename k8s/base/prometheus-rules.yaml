apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: iris-api-alerts
spec:
  groups:
  - name: iris.rules
    interval: 30s
    rules:
    - alert: IrisAPIDown
      expr: up{job="iris-api"} == 0
      for: 5m
      annotations:
        summary: "Iris API is down"
        description: "Iris API has been unreachable for 5 minutes"

    - alert: HighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
      for: 5m
      annotations:
        summary: "High error rate on Iris API"
        description: "Error rate is > 5% for 5 minutes"

    - alert: HighLatency
      expr: histogram_quantile(0.99, rate(iris_prediction_duration_seconds_bucket[5m])) > 0.5
      for: 10m
      annotations:
        summary: "High prediction latency"
        description: "p99 latency > 500ms for 10 minutes"

    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.01
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        description: "Pod has restarted {{ $value }} times in 15 minutes"

    - alert: OutOfMemory
      expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
      for: 5m
      annotations:
        summary: "Pod {{ $labels.pod }} is running out of memory"
        description: "Memory usage is > 90% of limit"
