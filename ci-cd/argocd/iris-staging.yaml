apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iris-api-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/your-repo/iris.git
    targetRevision: main
    path: k8s/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: iris-staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  info:
  - name: documentation
    value: https://github.com/your-repo/iris/blob/main/k8s/README.md
  - name: notifications
    value: slack://iris-deployments
