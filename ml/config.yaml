model:
  type: RandomForestClassifier
  hyperparameters:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
    min_samples_leaf: 1
    random_state: 42
    n_jobs: -1
    class_weight: balanced

data:
  test_size: 0.2
  random_state: 42
  stratify: true

training:
  cv_folds: 5
  random_state: 42

mlflow:
  experiment_name: iris-classification
  tracking_uri: ./mlruns
